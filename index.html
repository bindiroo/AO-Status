<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weekly AO report</title>
  <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
  <style>
    body{margin:0;font-family:Inter,Arial,sans-serif;background:#f7f6f2;color:#28251d}
    .wrap{max-width:1280px;margin:0 auto;padding:24px}
    .top{margin-bottom:24px}
    h1{margin:0 0 8px;font-size:42px}
    .sub{color:#6f6c66;line-height:1.5}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}
    .card{background:#fff;border:1px solid #d4d1ca;border-radius:18px;padding:18px;box-shadow:0 12px 32px rgba(40,37,29,.08)}
    .eyebrow{font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:#7a7974;margin-bottom:8px}
    .status{margin-top:10px;font-size:14px;color:#7a7974}
    .status.error{color:#964219}
    @media(max-width:900px){.grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div class="eyebrow">Weekly AO report</div>
      <h1>AO dollars by season</h1>
      <div class="sub" id="summary">Loading AO-Status.csv...</div>
      <div class="status" id="status">Reading data from AO-Status.csv</div>
    </div>
    <div class="grid">
      <div class="card"><div class="eyebrow">Summer AO cumulative dollars</div><div id="summerLine"></div></div>
      <div class="card"><div class="eyebrow">Summer AO seasonal totals</div><div id="summerBar"></div></div>
      <div class="card"><div class="eyebrow">Fall AO cumulative dollars</div><div id="fallLine"></div></div>
      <div class="card"><div class="eyebrow">Fall AO seasonal totals</div><div id="fallBar"></div></div>
    </div>
  </div>

<script>
const CSV_FILE = 'AO-Status.csv';
const SUMMER_START = {month: 2, day: 1};
const SUMMER_END = {month: 9, day: 1};
const FALL_START = {month: 7, day: 1};
const FALL_END = {month: 1, day: 1};

function parseCSV(text) {
  const rows = [];
  let row = [];
  let field = '';
  let inQuotes = false;
  for (let i = 0; i < text.length; i++) {
    const char = text[i];
    const next = text[i + 1];
    if (char === '"') {
      if (inQuotes && next === '"') {
        field += '"';
        i++;
      } else {
        inQuotes = !inQuotes;
      }
    } else if (char === ',' && !inQuotes) {
      row.push(field);
      field = '';
    } else if ((char === '
' || char === '') && !inQuotes) {
      if (char === '' && next === '
') i++;
      row.push(field);
      if (row.some(cell => cell.trim() !== '')) rows.push(row);
      row = [];
      field = '';
    } else {
      field += char;
    }
  }
  row.push(field);
  if (row.some(cell => cell.trim() !== '')) rows.push(row);
  return rows;
}

function normalizeKey(value) {
  return String(value || '').trim().toLowerCase().replace(/[^a-z0-9]+/g, '');
}

function detectColumns(headers) {
  const mapped = {};
  headers.forEach((header, idx) => {
    const key = normalizeKey(header);
    if (!mapped.season && ['season'].includes(key)) mapped.season = idx;
    if (!mapped.date && ['date','orderdate','bookingdate'].includes(key)) mapped.date = idx;
    if (!mapped.source && ['source','ordertype','window'].includes(key)) mapped.source = idx;
    if (!mapped.dollars && ['dollars','sales','amount','revenue','netsales'].includes(key)) mapped.dollars = idx;
    if (!mapped.units && ['units','qty','quantity'].includes(key)) mapped.units = idx;
  });
  return mapped;
}

function parseMoney(value) {
  const cleaned = String(value || '').replace(/[$,\s]/g, '');
  const n = parseFloat(cleaned);
  return Number.isFinite(n) ? n : 0;
}

function parseDateValue(value) {
  const v = String(value || '').trim();
  if (!v) return null;
  const d = new Date(v);
  if (!Number.isNaN(d.getTime())) return d;
  const m = v.match(/^(\d{1,2})\/(\d{1,2})\/(\d{2,4})$/);
  if (m) {
    const year = m[3].length === 2 ? 2000 + Number(m[3]) : Number(m[3]);
    const dt = new Date(year, Number(m[1]) - 1, Number(m[2]));
    if (!Number.isNaN(dt.getTime())) return dt;
  }
  return null;
}

function seasonLabel(raw, dateObj) {
  const s = String(raw || '').toUpperCase();
  if (s.includes('SUMMER')) return 'Summer';
  if (s.includes('FALL')) return 'Fall';
  if (!dateObj) return null;
  const m = dateObj.getMonth() + 1;
  if (m >= 2 && m <= 9) return 'Summer';
  if (m >= 7 || m === 1) return 'Fall';
  return null;
}

function formatMD(month, day) {
  const date = new Date(2024, month - 1, day);
  return date.toLocaleDateString('en-US', {month:'short', day:'numeric'});
}

function buildWindow(start, end) {
  const out = [];
  let cur = new Date(2024, start.month - 1, start.day);
  const finish = new Date(2024, end.month - 1, end.day);
  while (cur <= finish) {
    out.push({month: cur.getMonth() + 1, day: cur.getDate(), label: formatMD(cur.getMonth() + 1, cur.getDate())});
    cur.setDate(cur.getDate() + 1);
  }
  return out;
}

function buildCrossYearWindow(start, end) {
  const out = [];
  let cur = new Date(2024, start.month - 1, start.day);
  const mid = new Date(2024, 11, 31);
  while (cur <= mid) {
    out.push({month: cur.getMonth() + 1, day: cur.getDate(), label: formatMD(cur.getMonth() + 1, cur.getDate())});
    cur.setDate(cur.getDate() + 1);
  }
  cur = new Date(2025, 0, 1);
  const finish = new Date(2025, end.month - 1, end.day);
  while (cur <= finish) {
    out.push({month: cur.getMonth() + 1, day: cur.getDate(), label: formatMD(cur.getMonth() + 1, cur.getDate())});
    cur.setDate(cur.getDate() + 1);
  }
  return out;
}

const summerWindow = buildWindow(SUMMER_START, SUMMER_END);
const fallWindow = buildCrossYearWindow(FALL_START, FALL_END);

function cumulativeBySeason(records, season, windowDef) {
  const byYear = {};
  records.filter(r => r.season === season).forEach(r => {
    const year = r.date.getFullYear();
    const key = `${r.date.getMonth()+1}-${r.date.getDate()}`;
    byYear[year] = byYear[year] || {};
    byYear[year][key] = (byYear[year][key] || 0) + r.dollars;
  });
  const years = Object.keys(byYear).sort();
  const series = years.map(year => {
    let running = 0;
    const data = windowDef.map(d => {
      const key = `${d.month}-${d.day}`;
      running += byYear[year][key] || 0;
      return Math.round(running * 100) / 100;
    });
    return {name: String(year), data};
  });
  const totals = years.map(year => ({x: String(year), y: series.find(s => s.name === String(year)).data.at(-1) || 0}));
  return {categories: windowDef.map(d => d.label), series, totals};
}

function moneyFormatter(value) {
  return new Intl.NumberFormat('en-US', {style:'currency', currency:'USD', maximumFractionDigits:0}).format(value || 0);
}

function renderLine(el, title, categories, series) {
  return new ApexCharts(document.querySelector(el), {
    chart: {type:'line', height:340, toolbar:{show:false}, animations:{enabled:false}},
    series,
    xaxis: {categories, tickAmount: 8, labels: {rotate: -45, hideOverlappingLabels: true}},
    yaxis: {labels: {formatter: moneyFormatter}},
    stroke: {curve:'straight', width:3},
    tooltip: {y: {formatter: moneyFormatter}},
    legend: {position:'top'},
    grid: {borderColor:'#e7e2da'},
    colors: ['#01696f', '#da7101', '#7a39bb', '#437a22', '#006494']
  }).render();
}

function renderBar(el, totals) {
  return new ApexCharts(document.querySelector(el), {
    chart: {type:'bar', height:320, toolbar:{show:false}, animations:{enabled:false}},
    series: [{name:'Total', data: totals.map(d => d.y)}],
    xaxis: {categories: totals.map(d => d.x)},
    yaxis: {labels: {formatter: moneyFormatter}},
    tooltip: {y: {formatter: moneyFormatter}},
    plotOptions: {bar: {borderRadius: 6, distributed: true}},
    dataLabels: {enabled: false},
    legend: {show:false},
    grid: {borderColor:'#e7e2da'},
    colors: ['#01696f', '#da7101', '#7a39bb', '#437a22', '#006494']
  }).render();
}

async function init() {
  const summary = document.getElementById('summary');
  const status = document.getElementById('status');
  try {
    const res = await fetch(CSV_FILE, {cache:'no-store'});
    if (!res.ok) throw new Error(`Could not load ${CSV_FILE} (${res.status})`);
    const text = await res.text();
    const rows = parseCSV(text);
    if (rows.length < 2) throw new Error('CSV appears empty.');
    const headers = rows[0];
    const cols = detectColumns(headers);
    if (cols.date === undefined || cols.dollars === undefined) {
      throw new Error('CSV needs at least Date and Dollars columns.');
    }

    const records = rows.slice(1).map(r => {
      const date = parseDateValue(r[cols.date]);
      return {
        season: seasonLabel(cols.season !== undefined ? r[cols.season] : '', date),
        date,
        source: cols.source !== undefined ? r[cols.source] : '',
        dollars: parseMoney(r[cols.dollars])
      };
    }).filter(r => r.date && r.season && r.dollars > 0);

    if (!records.length) throw new Error('No usable AO rows found in the CSV.');

    records.sort((a,b) => a.date - b.date);
    const latest = records[records.length - 1].date.toLocaleDateString('en-US', {month:'short', day:'numeric', year:'numeric'});
    summary.textContent = `Latest AO booking in file: ${latest}. Summer window is Feb 1 to Sep 1. Fall window is Jul 1 to Jan 1.`;
    status.textContent = `Loaded ${records.length} AO rows from ${CSV_FILE}`;

    const summer = cumulativeBySeason(records, 'Summer', summerWindow);
    const fall = cumulativeBySeason(records, 'Fall', fallWindow);

    renderLine('#summerLine', 'Summer AO cumulative dollars', summer.categories, summer.series);
    renderBar('#summerBar', summer.totals);
    renderLine('#fallLine', 'Fall AO cumulative dollars', fall.categories, fall.series);
    renderBar('#fallBar', fall.totals);
  } catch (err) {
    summary.textContent = 'Unable to load AO data.';
    status.textContent = err.message;
    status.classList.add('error');
  }
}

init();
</script>
</body>
</html>
